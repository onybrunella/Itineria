services:
  db:
    container_name: itineria_postgres 
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: itineria_db
    ports:
      - "5432:5432"
    volumes:
      - itineria_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  itineria_db_data:	
